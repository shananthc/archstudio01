<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Projects — Shananth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #F8F6F1;
    --stone: #E8E4DC;
    --warm-gray: #C4BDB3;
    --mid: #8C8580;
    --dark: #2A2825;
    --accent: #BFA98A;
    --white: #FDFCFA;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--cream);
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 2rem 4rem;
    z-index: 100;
    background: rgba(42,40,37,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--cream);
    text-decoration: none;
  }
  .nav-back {
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--warm-gray);
    text-decoration: none;
    display: flex; align-items: center; gap: 0.6rem;
    transition: color 0.3s;
  }
  .nav-back:hover { color: var(--accent); }
  .nav-back svg { transition: transform 0.3s ease; }
  .nav-back:hover svg { transform: translateX(-4px); }

  /* PAGE HEADER */
  .page-header {
    padding: 10rem 4rem 4rem;
    max-width: 1400px;
    margin: 0 auto;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 4rem;
  }
  .page-label {
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .page-label::before {
    content: '';
    display: block; width: 24px; height: 1px;
    background: var(--accent);
  }
  .page-heading {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 6vw, 5rem);
    font-weight: 300;
    line-height: 1.05;
  }
  .page-heading em { font-style: italic; color: var(--accent); }

  /* PROJECTS GRID */
  .projects-wrapper {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 4rem 8rem;
  }
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5px;
  }
  .project-card {
    position: relative;
    overflow: hidden;
    aspect-ratio: 4/3;
    cursor: pointer;
    background: #1a1815;
  }
  .project-card:first-child {
    grid-column: 1 / 3;
    aspect-ratio: 16/9;
  }
  .project-img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), filter 0.5s ease;
    filter: saturate(0.5) brightness(0.85);
  }
  .project-card:hover .project-img {
    transform: scale(1.06);
    filter: saturate(0.8) brightness(0.75);
  }
  .project-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(20,18,16,0.9) 0%, rgba(20,18,16,0.1) 60%);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 2rem;
    pointer-events: none;
  }
  .project-cat {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .project-arrow {
    position: absolute; top: 1.5rem; right: 1.5rem;
    width: 36px; height: 36px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: translateY(-8px);
    transition: all 0.4s ease;
    pointer-events: none;
  }
  .project-card:hover .project-arrow {
    opacity: 1; transform: translateY(0);
  }

  /* VIDEO CARD */
  .project-video {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: saturate(0.5) brightness(0.85);
    transition: filter 0.5s ease;
    pointer-events: none;
  }
  .project-card:hover .project-video {
    filter: saturate(0.8) brightness(0.75);
  }
  .video-play-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(20,18,16,0.55);
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 5;
    transition: background 0.3s ease, transform 0.3s ease;
  }
  .video-play-btn:hover {
    background: rgba(191,169,138,0.7);
    transform: translate(-50%, -50%) scale(1.08);
  }
  .video-play-btn svg { display: block; }
  .video-play-btn .icon-pause { display: none; }
  .video-play-btn.is-playing .icon-play { display: none; }
  .video-play-btn.is-playing .icon-pause { display: block; }

  /* REVEAL */
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.9s cubic-bezier(0.25, 1, 0.5, 1), transform 0.9s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }
  .reveal-delay-4 { transition-delay: 0.4s; }

  /* FOOTER */
  footer {
    padding: 2rem 4rem;
    background: #1a1815;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .footer-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--warm-gray);
  }
  .footer-copy {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.06em;
  }
  .footer-socials { display: flex; gap: 1.5rem; }
  .footer-socials a {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    text-decoration: none;
    transition: color 0.3s;
  }
  .footer-socials a:hover { color: var(--accent); }

  /* LIGHTBOX */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(10,9,8,0.96);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .lightbox.active {
    display: flex;
    opacity: 1;
  }
  .lightbox-content {
    max-width: 1300px;
    max-height: 88vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: scale(0.96);
    transition: transform 0.35s ease;
  }
  .lightbox.active .lightbox-content {
    transform: scale(1);
  }
  .lightbox-content img,
  .lightbox-content video {
    max-width: 100%;
    max-height: 88vh;
    width: auto;
    height: auto;
    object-fit: contain;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .lightbox-close {
    position: absolute;
    top: 2rem; right: 2.5rem;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.3s ease, transform 0.3s ease;
    z-index: 1001;
  }
  .lightbox-close:hover {
    background: var(--accent);
    transform: rotate(90deg);
  }
  .lightbox-caption {
    position: absolute;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    text-align: center;
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    nav { padding: 1.5rem 2rem; }
    .page-header { padding: 8rem 2rem 3rem; }
    .projects-wrapper { padding: 0 2rem 5rem; }
    .projects-grid { grid-template-columns: 1fr; }
    .project-card:first-child { grid-column: auto; aspect-ratio: 4/3; }
    .video-play-btn { width: 52px; height: 52px; }
    footer { flex-direction: column; gap: 1rem; padding: 2rem; text-align: center; }
    .lightbox { padding: 1.2rem; }
    .lightbox-close { top: 1rem; right: 1rem; width: 40px; height: 40px; }
    .lightbox-caption { bottom: 1rem; font-size: 0.6rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">shananth</a>
  <a href="index.html" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M12 7H2M2 7l5-5M2 7l5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    Back to home
  </a>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-label reveal">Portfolio</div>
  <h1 class="page-heading reveal reveal-delay-1">All <em>projects</em></h1>
</div>

<!-- PROJECTS GRID -->
<div class="projects-wrapper">
  <div class="projects-grid">

    <div class="project-card reveal" data-type="image" data-src="images/project1.png" data-caption="Residential · Exterior">
      <img class="project-img" src="images/project1.png" alt="Modern Villa Exterior" loading="lazy" />
      <div class="project-overlay">
        <div class="project-cat">Residential · Exterior</div>
      </div>
      <div class="project-arrow">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 12L12 2M12 2H5M12 2v7" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <div class="project-card reveal reveal-delay-1" data-type="image" data-src="images/project2.jpg" data-caption="Residential · Exterior">
      <img class="project-img" src="images/project2.jpg" alt="Contemporary House" loading="lazy" />
      <div class="project-overlay">
        <div class="project-cat">Residential · Exterior</div>
      </div>
      <div class="project-arrow">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 12L12 2M12 2H5M12 2v7" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <div class="project-card reveal reveal-delay-2" data-type="image" data-src="images/project3.png" data-caption="Interior · Living Space">
      <img class="project-img" src="images/project3.png" alt="Interior Living Space" loading="lazy" />
      <div class="project-overlay">
        <div class="project-cat">Interior · Living Space</div>
      </div>
      <div class="project-arrow">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 12L12 2M12 2H5M12 2v7" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <div class="project-card reveal reveal-delay-3" data-type="image" data-src="images/project4.png" data-caption="Residential · Exterior">
      <img class="project-img" src="images/project4.png" alt="Traditional Villa" loading="lazy" />
      <div class="project-overlay">
        <div class="project-cat">Residential · Exterior</div>
      </div>
      <div class="project-arrow">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 12L12 2M12 2H5M12 2v7" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <div class="project-card reveal reveal-delay-4" data-type="image" data-src="images/project5.png" data-caption="Residential · Classic Exterior">
      <img class="project-img" src="images/project5.png" alt="Classic Villa" loading="lazy" />
      <div class="project-overlay">
        <div class="project-cat">Residential · Classic Exterior</div>
      </div>
      <div class="project-arrow">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 12L12 2M12 2H5M12 2v7" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- VIDEO PROJECT CARD -->
    <div class="project-card reveal reveal-delay-4" id="videoCard" data-type="video" data-src="images/videos/shananth.mp4" data-caption="Project Walkthrough · Video">
      <video class="project-video" id="projectVideo" src="images/videos/shananth.mp4" muted loop playsinline preload="metadata"></video>
      <div class="video-play-btn" id="videoPlayBtn" aria-label="Play video">
        <svg class="icon-play" width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M6 4l11 6-11 6V4z" fill="white"/>
        </svg>
        <svg class="icon-pause" width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="4" y="3" width="4" height="12" fill="white"/>
          <rect x="10" y="3" width="4" height="12" fill="white"/>
        </svg>
      </div>
      <div class="project-overlay">
        <div class="project-cat">Project Walkthrough · Video</div>
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">shananth</div>
  <div class="footer-copy">© 2026 · All rights reserved</div>
  <div class="footer-socials">
    <a href="https://www.instagram.com/arch_studio.1?igsh=bTlsZjB1cGtyMjZw" target="_blank">Instagram</a>
    <a href="https://www.linkedin.com/in/shananth-c" target="_blank">LinkedIn</a>
  </div>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-close" id="lightboxClose">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M2 2l12 12M14 2L2 14" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="lightbox-content" id="lightboxContent">
    <img id="lightboxImg" src="" alt="" style="display:none;">
    <video id="lightboxVideo" controls playsinline style="display:none;"></video>
  </div>
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<script>
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
  reveals.forEach(el => observer.observe(el));

  // VIDEO PLAY / PAUSE TOGGLE (inline preview on the grid card)
  const video = document.getElementById('projectVideo');
  const playBtn = document.getElementById('videoPlayBtn');

  playBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (video.paused) {
      const playPromise = video.play();
      if (playPromise !== undefined) {
        playPromise
          .then(() => { playBtn.classList.add('is-playing'); })
          .catch((err) => {
            console.error('Video failed to play:', err);
            alert('This video could not be played. It may need to be re-exported as H.264 MP4.');
          });
      }
    } else {
      video.pause();
      playBtn.classList.remove('is-playing');
    }
  });

  video.addEventListener('ended', () => {
    playBtn.classList.remove('is-playing');
  });

  video.addEventListener('error', () => {
    console.error('Video element error:', video.error);
  });

  // LIGHTBOX (fullscreen popup) for images and video
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxVideo = document.getElementById('lightboxVideo');
  const lightboxCaption = document.getElementById('lightboxCaption');
  const lightboxClose = document.getElementById('lightboxClose');
  const cards = document.querySelectorAll('.project-card');

  function openLightbox(type, src, caption) {
    lightboxCaption.textContent = caption || '';
    if (type === 'video') {
      lightboxImg.style.display = 'none';
      lightboxVideo.style.display = 'block';
      lightboxVideo.src = src;
      lightboxVideo.currentTime = 0;
      lightbox.classList.add('active');
      lightboxVideo.play().catch(() => {});
    } else {
      lightboxVideo.pause();
      lightboxVideo.style.display = 'none';
      lightboxImg.style.display = 'block';
      lightboxImg.src = src;
      lightbox.classList.add('active');
    }
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
    lightboxVideo.pause();
    lightboxVideo.removeAttribute('src');
    lightboxVideo.load();
    document.body.style.overflow = '';
  }

  cards.forEach(card => {
    card.addEventListener('click', (e) => {
      // Don't open lightbox if the click was on the inline play/pause button
      if (e.target.closest('#videoPlayBtn')) return;
      const type = card.getAttribute('data-type');
      const src = card.getAttribute('data-src');
      const caption = card.getAttribute('data-caption');
      openLightbox(type, src, caption);
    });
  });

  lightboxClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lightbox.classList.contains('active')) closeLightbox();
  });
</script>
</body>
</html>
